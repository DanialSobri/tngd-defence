server {
    listen 80;
    server_name ec2-13-215-207-167.ap-southeast-1.compute.amazonaws.com;

    set $backend_upstream http://127.0.0.1:8000;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Optional frontend/static root. Update if you host UI files on this server.
    location / {
        return 200 "tngd-defence nginx is up\n";
        add_header Content-Type text/plain;
    }

    # Keep /api (without trailing slash) canonical.
    location = /api {
        return 301 /api/;
    }

    # Proxy all backend APIs under /api/*
    # Example: /api/v1/users -> backend /v1/users
    location /api/ {
        proxy_pass $backend_upstream/;
    }

    # Expose backend docs directly at /docs
    location /docs {
        proxy_pass $backend_upstream/docs;
    }

    # Expose optional redoc endpoint.
    location /redoc {
        proxy_pass $backend_upstream/redoc;
    }

    # Required by docs UI to load OpenAPI schema.
    location /openapi.json {
        proxy_pass $backend_upstream/openapi.json;
    }
}
